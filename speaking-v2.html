<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speaking Translator — Powered by GPT-Realtime-2</title>
<style>
  :root {
    --bg:      #0d0d0d;
    --card:    #1a1a1a;
    --border:  #2d2d2d;
    --green:   #10a37f;
    --green-h: #0d8f6f;
    --red:     #ef4444;
    --red-h:   #dc2626;
    --text:    #ececec;
    --muted:   #888;
    --r:       10px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .app { width: 100%; max-width: 700px; display: flex; flex-direction: column; gap: 14px; }

  /* ── Header ── */
  .header { display: flex; align-items: center; gap: 10px; }
  .header h1 { font-size: 20px; font-weight: 600; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #444; flex-shrink: 0; transition: background .3s; }
  .dot.yellow { background: #f59e0b; }
  .dot.green  { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.red    { background: var(--red); }
  .status-text { font-size: 13px; color: var(--muted); margin-left: auto; }

  /* ── Card ── */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 14px 16px; }
  .card-label { font-size: 12px; color: var(--muted); margin-bottom: 8px; }

  /* ── API Key ── */
  .api-row { display: flex; gap: 8px; }
  input[type=password] {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 12px; color: var(--text); font-size: 14px; font-family: monospace;
  }
  input[type=password]:focus { outline: none; border-color: var(--green); }

  /* ── Language row ── */
  .lang-row { display: flex; align-items: flex-end; gap: 10px; }
  .field { flex: 1; display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 12px; color: var(--muted); }
  .auto-badge {
    font-size: 11px; color: var(--green); background: #10a37f22;
    border: 1px solid #10a37f44; border-radius: 4px; padding: 2px 6px;
    display: inline-block; margin-top: 2px;
  }
  select {
    background: var(--card); border: 1px solid var(--border); border-radius: 6px;
    padding: 9px 12px; color: var(--text); font-size: 14px; cursor: pointer; width: 100%;
  }
  select:focus { outline: none; border-color: var(--green); }
  .arrow-lbl { font-size: 22px; color: var(--muted); padding-bottom: 6px; line-height: 1; }

  /* ── Transcript ── */
  .transcript {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--r);
    padding: 18px; min-height: 200px; max-height: 340px; overflow-y: auto;
  }
  .hint-text { color: var(--muted); font-size: 15px; line-height: 1.7; }
  .hint-text strong { color: #bbb; }
  .line { font-size: 20px; line-height: 1.65; margin-bottom: 10px; word-break: break-word; }
  .line:last-child { margin-bottom: 0; }
  .transcript::-webkit-scrollbar { width: 5px; }
  .transcript::-webkit-scrollbar-track { background: transparent; }
  .transcript::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Meter ── */
  .meter-row { display: flex; align-items: center; gap: 10px; }
  .meter-lbl { font-size: 12px; color: var(--muted); width: 28px; }
  .meter-bg { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .meter-fill { height: 100%; width: 0%; background: var(--green); border-radius: 3px; transition: width .04s; }
  .meter-fill.hot { background: #34d399; }

  /* ── Buttons ── */
  .btn-row { display: flex; gap: 10px; }
  button {
    padding: 10px 18px; border-radius: 8px; border: none;
    font-size: 14px; font-weight: 500; cursor: pointer;
    transition: background .15s, opacity .15s; font-family: inherit;
  }
  button:disabled { opacity: .4; cursor: default; }
  .btn-primary { background: var(--green); color: #fff; flex: 1; font-size: 15px; }
  .btn-primary:hover:not(:disabled) { background: var(--green-h); }
  .btn-primary.danger { background: var(--red); }
  .btn-primary.danger:hover:not(:disabled) { background: var(--red-h); }
  .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover:not(:disabled) { background: var(--border); }
  .btn-save { background: var(--green); color: #fff; padding: 8px 16px; font-size: 14px; border-radius: 6px; }
  .btn-save:hover { background: var(--green-h); }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="dot" id="dot"></div>
    <h1>Speaking Translator</h1>
    <span class="status-text" id="statusText">Not connected</span>
  </div>

  <!-- API Key -->
  <div class="card">
    <div class="card-label">OpenAI API Key — saved only in your browser, never sent elsewhere</div>
    <div class="api-row">
      <input type="password" id="apiKeyInput" placeholder="sk-..." />
      <button class="btn-save" onclick="saveKey()">Save</button>
    </div>
  </div>

  <!-- Language Pair -->
  <div class="lang-row">
    <div class="field">
      <label>You speak</label>
      <span class="auto-badge">✦ Auto-detected</span>
    </div>
    <div class="arrow-lbl">→</div>
    <div class="field">
      <label>Translate to</label>
      <select id="outputLang" onchange="onLangChange()">
        <option value="en">English 🇺🇸</option>
        <option value="ja">Japanese 🇯🇵</option>
        <option value="zh">Chinese 🇨🇳</option>
        <option value="ko">Korean 🇰🇷</option>
        <option value="es">Spanish 🇪🇸</option>
        <option value="fr">French 🇫🇷</option>
        <option value="de">German 🇩🇪</option>
      </select>
    </div>
  </div>

  <!-- Transcript -->
  <div class="transcript" id="transcript">
    <p class="hint-text" id="hint">
      Press <strong>Start</strong> and speak in any language —
      translation will appear here in real time.
    </p>
  </div>

  <!-- Mic Level -->
  <div class="meter-row">
    <span class="meter-lbl">Mic</span>
    <div class="meter-bg"><div class="meter-fill" id="meter"></div></div>
  </div>

  <!-- Controls -->
  <div class="btn-row">
    <button class="btn-primary" id="startBtn" onclick="toggleSession()">▶ Start</button>
    <button class="btn-secondary" onclick="clearTranscript()">🗑 Clear</button>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════
//  AudioWorklet
// ═══════════════════════════════════════════════════════
const WORKLET = `
class PCMProc extends AudioWorkletProcessor {
  constructor() { super(); this._buf = []; this._chunkSize = 480; }
  process(inputs) {
    const ch = inputs[0]?.[0];
    if (!ch) return true;
    for (let i = 0; i < ch.length; i++) this._buf.push(ch[i]);
    while (this._buf.length >= this._chunkSize) {
      const raw = this._buf.splice(0, this._chunkSize);
      const pcm16 = new Int16Array(this._chunkSize);
      let ss = 0;
      for (let i = 0; i < this._chunkSize; i++) {
        const s = Math.max(-1, Math.min(1, raw[i]));
        pcm16[i] = s < 0 ? s * 32768 : s * 32767;
        ss += s * s;
      }
      this.port.postMessage(
        { buf: pcm16.buffer, rms: Math.sqrt(ss / this._chunkSize) },
        [pcm16.buffer]
      );
    }
    return true;
  }
}
registerProcessor('pcm-proc', PCMProc);
`;

// ═══════════════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════════════
let ws=null, audioCtx=null, playCtx=null, micStream=null, workletNode=null;
let isActive=false, playQueue=[], isPlaying=false, curLine=null;

{ const s=localStorage.getItem('oai_key'); if(s) document.getElementById('apiKeyInput').value=s; }
{ const l=localStorage.getItem('oai_outlang'); if(l) document.getElementById('outputLang').value=l; }

// ═══════════════════════════════════════════════════════
//  API Key / Status / Language
// ═══════════════════════════════════════════════════════
function saveKey() {
  const k=document.getElementById('apiKeyInput').value.trim(); if(!k) return;
  localStorage.setItem('oai_key',k);
  setStatus('Key saved ✓',''); setTimeout(()=>setStatus('Not connected',''),2000);
}
function getKey() {
  return document.getElementById('apiKeyInput').value.trim()||localStorage.getItem('oai_key')||'';
}
function setStatus(text,cls) {
  document.getElementById('statusText').textContent=text;
  document.getElementById('dot').className='dot'+(cls?' '+cls:'');
}
function onLangChange() {
  const l=document.getElementById('outputLang').value;
  localStorage.setItem('oai_outlang',l);
  if(ws?.readyState===WebSocket.OPEN) sendSessionUpdate();
}

// ═══════════════════════════════════════════════════════
//  WebSocket
// ═══════════════════════════════════════════════════════
function openWS() {
  const key=getKey();
  if(!key){alert('Please enter your OpenAI API key first.');return false;}
  setStatus('Connecting…','yellow');
  ws=new WebSocket(
    'wss://api.openai.com/v1/realtime/translations?model=gpt-realtime-translate',
    ['realtime',`openai-insecure-api-key.${key}`]
  );
  ws.onopen   = () => setStatus('Connected','green');
  ws.onmessage= (e) => onServerEvent(JSON.parse(e.data));
  ws.onerror  = () => { setStatus('Connection error','red'); doStop(); };
  ws.onclose  = () => { if(isActive) doStop(); };
  return true;
}

function sendSessionUpdate() {
  if(ws?.readyState!==WebSocket.OPEN) return;
  ws.send(JSON.stringify({
    type:'session.update',
    session:{
      audio:{
        input:{
          transcription:{ model:'gpt-realtime-whisper' },
          noise_reduction:{ type:'near_field' }
        },
        output:{
          language: document.getElementById('outputLang').value
        }
      }
    }
  }));
}

function onServerEvent(m) {
  switch(m.type) {
    // ── セッション管理 ──────────────────────────────
    case 'session.created':
      sendSessionUpdate();
      break;

    // ── テキスト出力（Translation API の正しいイベント名）──
    case 'session.output_text.delta':
      appendText(m.delta ?? '');
      break;
    case 'session.output_text.done':
      curLine = null;   // 次のフレーズは新しい行へ
      break;

    // ── 音声出力（Translation API の正しいイベント名）──
    case 'session.output_audio.delta':
      if(m.delta) enqueueAudio(m.delta);
      break;

    // ── エラー ──────────────────────────────────────
    case 'error':
      setStatus('API error: '+(m.error?.message??'?'),'red');
      console.error('OpenAI error',m);
      break;
  }
}

// ═══════════════════════════════════════════════════════
//  Microphone capture
// ═══════════════════════════════════════════════════════
async function startMic() {
  audioCtx = new AudioContext({sampleRate:24000});
  playCtx  = new AudioContext({sampleRate:24000});

  const blob = new Blob([WORKLET],{type:'application/javascript'});
  const url  = URL.createObjectURL(blob);
  await audioCtx.audioWorklet.addModule(url);
  URL.revokeObjectURL(url);

  micStream = await navigator.mediaDevices.getUserMedia({
    audio:{echoCancellation:true, noiseSuppression:true, sampleRate:24000}
  });

  const src   = audioCtx.createMediaStreamSource(micStream);
  workletNode = new AudioWorkletNode(audioCtx,'pcm-proc');

  workletNode.port.onmessage = ({data:{buf,rms}}) => {
    setMeter(rms);
    if(ws?.readyState===WebSocket.OPEN) {
      ws.send(JSON.stringify({
        type:'session.input_audio_buffer.append',
        audio: bufToB64(buf)
      }));
    }
  };

  src.connect(workletNode);
}

function stopMic() {
  workletNode?.disconnect(); workletNode=null;
  micStream?.getTracks().forEach(t=>t.stop()); micStream=null;
  audioCtx?.close(); audioCtx=null;
  setMeter(0);
}

// ═══════════════════════════════════════════════════════
//  Audio playback
// ═══════════════════════════════════════════════════════
function enqueueAudio(b64) {
  const raw=atob(b64);
  const pcm=new Int16Array(raw.length/2);
  for(let i=0;i<pcm.length;i++) pcm[i]=raw.charCodeAt(i*2)|(raw.charCodeAt(i*2+1)<<8);
  const f32=new Float32Array(pcm.length);
  for(let i=0;i<pcm.length;i++) f32[i]=pcm[i]/32768.0;
  playQueue.push(f32);
  if(!isPlaying) schedulePlay();
}
function schedulePlay() {
  if(!playQueue.length||!playCtx){isPlaying=false;return;}
  isPlaying=true;
  const f32=playQueue.shift();
  const buf=playCtx.createBuffer(1,f32.length,24000);
  buf.copyToChannel(f32,0);
  const src=playCtx.createBufferSource();
  src.buffer=buf; src.connect(playCtx.destination);
  src.onended=schedulePlay; src.start();
}

// ═══════════════════════════════════════════════════════
//  Transcript
// ═══════════════════════════════════════════════════════
function appendText(t) {
  const area=document.getElementById('transcript');
  const hint=document.getElementById('hint'); if(hint) hint.remove();
  if(!curLine){
    curLine=document.createElement('p');
    curLine.className='line';
    area.appendChild(curLine);
  }
  curLine.textContent+=t;
  area.scrollTop=area.scrollHeight;
}
function clearTranscript() {
  document.getElementById('transcript').innerHTML=
    '<p class="hint-text" id="hint">Press <strong>Start</strong> and speak in any language — translation will appear here in real time.</p>';
  curLine=null;
}

// ═══════════════════════════════════════════════════════
//  Level meter
// ═══════════════════════════════════════════════════════
function setMeter(rms) {
  const pct=Math.min(100,rms*500);
  const el=document.getElementById('meter');
  el.style.width=pct+'%';
  el.className='meter-fill'+(pct>8?' hot':'');
}

// ═══════════════════════════════════════════════════════
//  Session toggle
// ═══════════════════════════════════════════════════════
async function toggleSession() { if(!isActive) await doStart(); else doStop(); }

async function doStart() {
  if(!openWS()) return;
  try {
    await startMic();
    isActive=true;
    const btn=document.getElementById('startBtn');
    btn.textContent='■ Stop'; btn.classList.add('danger');
  } catch(e) {
    setStatus('Microphone access denied','red');
    ws?.close(); ws=null;
  }
}
function doStop() {
  isActive=false; playQueue=[]; isPlaying=false;
  stopMic();
  if(ws&&ws.readyState<WebSocket.CLOSING) ws.close(); ws=null;
  playCtx?.close(); playCtx=null;
  setStatus('Not connected','');
  const btn=document.getElementById('startBtn');
  btn.textContent='▶ Start'; btn.classList.remove('danger');
}

// ═══════════════════════════════════════════════════════
//  Utility
// ═══════════════════════════════════════════════════════
function bufToB64(buf) {
  const b=new Uint8Array(buf); let s='';
  for(let i=0;i<b.length;i++) s+=String.fromCharCode(b[i]);
  return btoa(s);
}
</script>
</body>
</html>
